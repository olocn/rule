name: Convert Direct

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

# ================= 并发控制 =================
concurrency:
  group: repo-master-push
  cancel-in-progress: false

# ================= 显式权限 =================
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 

      - name: Set date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Download and Convert Rules
        run: |
          set -e
          
          # 清理并重建 qx 文件夹
          rm -rf qx
          mkdir -p qx
          
          OUTPUT_PATH="qx/direct.snippet"
          echo "# Original: Loyalsoldier direct-list.txt" > "$OUTPUT_PATH"
          echo "# Converted: ${DATE}" >> "$OUTPUT_PATH"
          
          echo "Downloading direct-list.txt..."
          curl -L "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/direct-list.txt" -o temp_direct.txt
          
          echo "Converting to Quantumult X format..."
          # 处理逻辑：
          # 1. 过滤掉注释行 (#) 和空行
          # 2. 移除每行可能存在的 Windows 回车符 (\r)
          # 3. 排除带有 regexp: 的复杂正则行（Quantumult X snippet 不支持原生 v2ray 正则）
          # 4. 将 full:example.com 转换为 host, example.com, direct
          # 5. 将普通域名 example.com 转换为 host-suffix, example.com, direct
          awk '
          {
            gsub(/\r/, "", $0);
            gsub(/^[[:space:]]+|[[:space:]]+$/, "", $0);
            
            # 跳过注释、空行以及正则行
            if ($0 ~ /^#/ || $0 == "" || $0 ~ /^regexp:/) next;
            
            if ($0 ~ /^full:/) {
              # 精确匹配
              sub(/^full:/, "", $0);
              printf("host, %s, direct\n", $0);
            } else {
              # 域名后缀匹配（包含子域名）
              printf("host-suffix, %s, direct\n", $0);
            }
          }' temp_direct.txt >> "$OUTPUT_PATH"
          
          rm temp_direct.txt
          echo "Conversion completed. Saved to $OUTPUT_PATH"

      # ================= 安全提交与重试 =================
      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A qx/
          
          if ! git diff --cached --quiet; then
            git commit -m "Sync Loyalsoldier direct list (${DATE})"
            
            PUSH_SUCCESS=false
            for i in {1..3}; do
              echo "Attempt $i: Pulling latest changes via rebase and pushing..."
              git pull --rebase origin master
              
              if git push origin master; then
                echo "Push successfully completed!"
                PUSH_SUCCESS=true
                break
              fi
              
              echo "Push rejected by remote ref lock. Retrying in 5 seconds..."
              sleep 5
            done
            
            if [ "$PUSH_SUCCESS" = false ]; then
              echo "Error: Failed to push changes after 3 attempts."
              exit 1
            fi
          else
            echo "No changes detected. Skipping commit and push."
          fi
