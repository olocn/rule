name: 转换

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

# ================= 核心修复 1: 并发控制 =================
# 确保同一时间只有一个实例在处理 master 分支的推送，彻底解决锁冲突
concurrency:
  group: repo-master-push
  cancel-in-progress: false # 开启排队等待，不强行中断正在运行的实例

# ================= 核心修复 2: 显式权限 =================
# 确保 GitHub Actions 拥有向仓库写入（Push）的权限
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # 升级到 v5 以支持高版本 Node.js，拉取完整历史以确保 rebase 顺利进行
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 

      - name: Set date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Download and Convert Rules
        run: |
          set -e
          
          # 清理并重建 qx 文件夹
          rm -rf qx
          mkdir -p qx
          
          echo "Fetching file list from olocn/rule..."
          FILES=$(curl -s "https://api.github.com/repos/olocn/rule/contents/surge?ref=master" | jq -r '.[] | select(.type=="file") | .download_url')

          for url in $FILES; do
            filename=$(basename "$url")
            
            # 排除指定文件
            if [ "$filename" = "RealIP.module" ] || [ "$filename" = "ad.txt" ] || [ "$filename" = "reject-drop.txt" ]; then
              echo "Skipping excluded file: $filename"
              continue
            fi
            
            policy_name="${filename%.*}"
            echo "Processing $filename -> qx/${policy_name}.snippet"
            
            curl -L "$url" -o "temp_$filename"
            
            output_path="qx/${policy_name}.snippet"
            echo "# Original: $filename" > "$output_path"
            echo "# Converted: ${DATE}" >> "$output_path"
            
            # 预处理与核心转换逻辑
            sed -i 's/DOMAIN-KEYWORD/host-keyword/Ig' "temp_$filename"
            sed -i 's/DOMAIN-SUFFIX/host-suffix/Ig' "temp_$filename"
            sed -i 's/DOMAIN,/host,/Ig' "temp_$filename"

            awk -F',' -v p_name="$policy_name" '
            {
              gsub(/\r/, "", $0);
              for (i=1; i<=3; i++) {
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", $i);
              }

              if ($1 ~ /^#/ || $1 == "" || $0 ~ /PROCESS-NAME|URL-REGEX|AND|OR|NOT/) next;

              type = tolower($1);
              val = $2;

              if (type == "host" || type == "host-suffix" || type == "host-keyword" || type ~ /cidr|geoip|asn|user-agent/) {
                current_policy = (p_name == "system") ? "direct" : p_name;
                if (toupper($0) ~ /REJECT/) current_policy = "reject";

                if (val != "") {
                  printf("%s, %s, %s\n", type, val, current_policy);
                }
              }
            }' "temp_$filename" >> "$output_path"
            
            rm "temp_$filename"
          done

      # ================= 核心修复 3: 安全提交与重试 =================
      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A qx/
          
          # 检查是否有内容变更，避免产生空的 commit
          if ! git diff --cached --quiet; then
            git commit -m "Upgrade to Node.js 24 & Sync rules (${DATE})"
            
            # 引入最多 3 次的高密集重试循环，应对极端的瞬间并发
            PUSH_SUCCESS=false
            for i in {1..3}; do
              echo "Attempt $i: Pulling latest changes via rebase and pushing..."
              
              # 每次 push 前均拉取最新远程提交，保持线性历史
              git pull --rebase origin master
              
              if git push origin master; then
                echo "Push successfully completed!"
                PUSH_SUCCESS=true
                break
              fi
              
              echo "Push rejected by remote ref lock. Retrying in 5 seconds..."
              sleep 5
            done
            
            if [ "$PUSH_SUCCESS" = false ]; then
              echo "Error: Failed to push changes after 3 attempts due to persistent remote lock."
              exit 1
            fi
          else
            echo "No changes detected. Skipping commit and push."
          fi
