name: Convert

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Download and Convert Rules
        run: |
          set -e
          
          # 1️⃣ 创建存放目录
          mkdir -p qx
          
          echo "Fetching file list from olocn/rule..."
          FILES=$(curl -s "https://api.github.com/repos/olocn/rule/contents/surge?ref=master" | jq -r '.[] | select(.type=="file") | .download_url')

          for url in $FILES; do
            filename=$(basename "$url")
            
            # 2️⃣ 排除指定文件
            if [ "$filename" = "RealIP.module" ] || [ "$filename" = "ad.txt" ] || [ "$filename" = "reject-drop.txt" ]; then
              echo "Skipping excluded file: $filename"
              continue
            fi
            
            # 3️⃣ 提取策略名（文件名，不带后缀）
            policy_name="${filename%.*}"
            
            echo "Processing $filename -> qx/${policy_name}.snippet"
            
            curl -L "$url" -o "temp_$filename"
            
            output_path="qx/${policy_name}.snippet"
            echo "# Original: $filename" > "$output_path"
            echo "# Converted: ${DATE}" >> "$output_path"
            
            # 4️⃣ 核心转换逻辑 (含 host-keyword 转换)
            cat "temp_$filename" | sed '/^\s*$/d' | grep -v '^#' | grep -v -E 'PROCESS-NAME|URL-REGEX|AND|OR|NOT' | awk -F',' -v p_name="$policy_name" '
            {
              # 清理多余参数和空格
              gsub(/no-resolve|extended-matching|pre-matching| /, "", $0);
              
              # 类型匹配与转换
              type = ""
              if ($1 == "DOMAIN") type = "host";
              else if ($1 == "DOMAIN-SUFFIX") type = "host-suffix";
              else if ($1 == "DOMAIN-KEYWORD") type = "host-keyword";
              else if ($1 == "IP-CIDR") type = "ip-cidr";
              else if ($1 == "IP-CIDR6") type = "ip6-cidr";
              else if ($1 == "GEOIP") type = "geoip";
              else if ($1 == "IP-ASN") type = "ip-asn";
              else if ($1 == "USER-AGENT") type = "user-agent";

              if (type != "") {
                # 策略逻辑确定
                # 默认策略采用文件名
                current_policy = p_name;
                
                # 特殊处理：system 文件强制直连
                if (p_name == "system") {
                  current_policy = "direct";
                }
                
                # 强制保护：原规则是 REJECT 的一律保持 reject
                if ($0 ~ /REJECT/) {
                  current_policy = "reject";
                }

                # 输出 QX 标准格式
                print type ", " $2 ", " current_policy
              }
            }' >> "$output_path"
            
            rm "temp_$filename"
          done

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add qx/*.snippet
          git commit -m "Final rule update: system->direct, others->filename, keyword->host-keyword (${DATE})" || echo "No changes"
          git push
