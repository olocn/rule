name: Convert Olocn Rules (Fix Keyword Match)

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Download and Convert Rules
        run: |
          set -e
          
          # 1️⃣ 清理并重建 qx 文件夹
          rm -rf qx
          mkdir -p qx
          
          echo "Fetching file list from olocn/rule..."
          FILES=$(curl -s "https://api.github.com/repos/olocn/rule/contents/surge?ref=master" | jq -r '.[] | select(.type=="file") | .download_url')

          for url in $FILES; do
            filename=$(basename "$url")
            
            # 2️⃣ 排除指定文件
            if [ "$filename" = "RealIP.module" ] || [ "$filename" = "ad.txt" ] || [ "$filename" = "reject-drop.txt" ]; then
              echo "Skipping excluded file: $filename"
              continue
            fi
            
            policy_name="${filename%.*}"
            curl -L "$url" -o "temp_$filename"
            
            output_path="qx/${policy_name}.snippet"
            echo "# Original: $filename" > "$output_path"
            echo "# Converted: ${DATE}" >> "$output_path"
            
            # 3️⃣ 核心转换逻辑（修正后的版本）
            # 我们直接在 awk 中处理所有逻辑，不再依靠前面的 grep/sed 进行复杂过滤
            awk -F',' -v p_name="$policy_name" '
            {
              # 清理：移除回车符和所有空格/制表符
              gsub(/\r/, "", $0);
              gsub(/[[:space:]]/, "", $0);
              
              # 跳过空行和注释
              if ($0 == "" || $0 ~ /^#/) next;
              
              # 跳过 QX 不支持的高级类型
              if ($0 ~ /PROCESS-NAME|URL-REGEX|AND|OR|NOT/) next;

              # 提取原始类型（转大写）和内容
              orig_type = toupper($1);
              val = $2;

              # 类型转换映射
              type = "";
              if (orig_type == "DOMAIN") type = "host";
              else if (orig_type == "DOMAIN-SUFFIX") type = "host-suffix";
              else if (orig_type == "DOMAIN-KEYWORD") type = "host-keyword";
              else if (orig_type == "IP-CIDR") type = "ip-cidr";
              else if (orig_type == "IP-CIDR6") type = "ip6-cidr";
              else if (orig_type == "GEOIP") type = "geoip";
              else if (orig_type == "IP-ASN") type = "ip-asn";
              else if (orig_type == "USER-AGENT") type = "user-agent";

              if (type != "" && val != "") {
                # 策略逻辑判定
                current_policy = p_name;
                
                # 如果是 system 文件，强制使用 direct
                if (p_name == "system") {
                  current_policy = "direct";
                }
                
                # 如果原始行包含 REJECT 关键字，强制保持 reject
                if (toupper($0) ~ /REJECT/) {
                  current_policy = "reject";
                }

                # 打印最终格式
                printf("%s, %s, %s\n", type, val, current_policy);
              }
            }' "temp_$filename" >> "$output_path"
            
            rm "temp_$filename"
          done

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A qx/
          git commit -m "Fix: DOMAIN-KEYWORD conversion logic (${DATE})" || echo "No changes"
          git push
