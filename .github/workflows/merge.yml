name: Merge Rules

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    # 强制开启 Node.js 24 以适配 2026 年 GitHub Actions 要求
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Download sgmodule
        run: |
          curl -L \
          https://raw.githubusercontent.com/QingRex/LoonKissSurge/main/Surge/%E5%B9%BF%E5%91%8A%E5%B9%B3%E5%8F%B0%E6%8B%A6%E6%88%AA%E5%99%A8.sgmodule \
          -o module.sgmodule

      - name: Download conf rules
        run: |
          curl -L https://raw.githubusercontent.com/olocn/rule/refs/heads/master/surge/reject-drop.txt -o ruleA.txt
          curl -L https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Surge-RULE-SET.list -o ruleB.list

      - name: Extract + merge + optimize rules
        run: |
          set -e

          # 1️⃣ 提取 sgmodule 的 [Rule]
          awk '
            /^\[Rule\]/ {flag=1; next}
            /^\[/ {flag=0}
            flag {print}
          ' module.sgmodule > sg_rules.tmp

          # 2️⃣ 清洗与智能类型转换
          cat sg_rules.tmp ruleA.txt ruleB.list \
            | sed '/^\s*$/d' \
            | grep -v '^#' \
            | sed -E 's/,(REJECT|reject|REJECT-DROP|reject-drop)//gI' \
            | sed 's/,extended-matching//g; s/,pre-matching//g; s/,no-resolve//g' \
            | sed 's/[[:space:]]//g' \
            | awk -F',' '
              BEGIN { OFS="," }
              {
                # 仅针对 DOMAIN 类型进行判断
                if ($1 == "DOMAIN") {
                  split($2, parts, ".");
                  # 仅两段式域名（根域名）转为 SUFFIX
                  if (length(parts) == 2) {
                    $1 = "DOMAIN-SUFFIX"
                  }
                  # 其他子域名（3段及以上）保持 DOMAIN
                }
                # 如果原本就是 DOMAIN-SUFFIX，则不论几段都保持原样
                print $0
              }' \
            | awk '!seen[$0]++' \
            > rules.cleaned

          # 3️⃣ 深度优化逻辑：移除冗余规则
          # 如果有了 DOMAIN-SUFFIX,taobao.com，则自动删除 DOMAIN,adashx.m.taobao.com
          awk -F',' '
          {
            rules[NR] = $0
            type[NR]  = $1
            val[NR]   = $2
            if ($1 == "DOMAIN-SUFFIX") suffix_list[$2] = 1
          }
          END {
            for (i = 1; i <= NR; i++) {
              skip = 0
              if (type[i] == "DOMAIN") {
                for (s in suffix_list) {
                  # 如果该子域名被现有的某个后缀规则包含了，则剔除
                  if (val[i] == s || val[i] ~ ("\\." s "$")) {
                    skip = 1
                    break
                  }
                }
              } else if (type[i] == "DOMAIN-SUFFIX") {
                for (s in suffix_list) {
                  # 较长的后缀规则如果被较短的覆盖，也剔除
                  if (val[i] != s && val[i] ~ ("\\." s "$")) {
                    skip = 1
                    break
                  }
                }
              }
              if (!skip) print rules[i]
            }
          }' rules.cleaned > rules.optimized

          # 4️⃣ 生成各格式文件
          # Surge 格式：彻底去掉末尾的 ,REJECT
          SURGE_OUT="ads-latest.txt"
          echo "# Auto merged Surge rules (${DATE})" > "$SURGE_OUT"
          awk -F',' '
          {
            split($2, d, ".");
            root = d[length(d)-1] "." d[length(d)];
            print root "\t" $0
          }' rules.optimized \
            | sort -k1,1 \
            | cut -f2- >> "$SURGE_OUT"

          # MosDNS 格式
          MOSDNS_OUT="ads-mosdns.txt"
          echo "# Auto merged MosDNS rules (${DATE})" > "$MOSDNS_OUT"
          awk -F',' '{
            if ($1 == "DOMAIN-SUFFIX") print "domain:" $2
            else if ($1 == "DOMAIN") print "full:" $2
            else if ($1 == "DOMAIN-KEYWORD") print "keyword:" $2
          }' rules.optimized >> "$MOSDNS_OUT"

          # Quantumult X 格式 (保留其标准的 reject 后缀以便正常运行)
          QX_OUT="ads-qx.snippet"
          echo "# Auto merged Quantumult X rules (${DATE})" > "$QX_OUT"
          awk -F',' '{
            if ($1 == "DOMAIN-SUFFIX") print "host-suffix, " $2 ", reject"
            else if ($1 == "DOMAIN") print "host, " $2 ", reject"
            else if ($1 == "DOMAIN-KEYWORD") print "host-keyword, " $2 ", reject"
          }' rules.optimized >> "$QX_OUT"

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ads-latest.txt ads-mosdns.txt ads-qx.snippet
          git commit -m "Update rules: Keep subdomain types and fix Node version (${DATE})" || echo "No changes"
          git push
